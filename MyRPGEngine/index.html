<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мини RPG Maker Engine</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Базовые стили для предотвращения размытия при зуме пиксель-арта */
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* --- СТИЛИ ДЛЯ СВОРАЧИВАНИЯ БЛОКА КАРТ --- */
        #sidebar {
            display: flex;
            flex-direction: column;
        }
        .sidebar-section {
            flex: 1 1 0%; /* По умолчанию делят место поровну */
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .sidebar-section.collapsed {
            flex: 0 0 auto; /* Свернутая секция занимает только размер заголовка */
        }
        .sidebar-section.collapsed > .sidebar-content,
        .sidebar-section.collapsed > button {
            display: none; /* Скрываем содержимое */
        }
        .sidebar-header {
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">Загрузка ассетов...<br><small>Убедитесь, что папки img/tilesets, img/characters, img/faces существуют</small></div>

    <div id="editor-view">
        <div id="toolbar">
            <div class="toolbar-group">
                <button class="mode-btn active" id="mode-tile" onclick="setMode('tile')">🖌️</button>
                <button class="mode-btn" id="mode-fill" onclick="setMode('fill')">🪣</button>
                <button class="mode-btn" id="mode-event" onclick="setMode('event')">📎</button>
                <button class="mode-btn" id="mode-player" onclick="setMode('player')">🧍</button>
            </div>
            <div class="toolbar-group">
                <button class="zoom-btn" onclick="zoomEditor(-1)">🔍-</button>
                <span class="zoom-label" id="zoom-label">100%</span>
                <button class="zoom-btn" onclick="zoomEditor(1)">🔍+</button>
            </div>
            <div class="toolbar-group map-size-group"><label>Ш:</label> <input type="number" id="map-width" value="17" min="1"><label>В:</label> <input type="number" id="map-height" value="13" min="1"><button onclick="applyMapSize()">Размер</button></div>
            <div class="toolbar-group"><button class="save-btn" onclick="saveProject()">Сохранить</button><button class="load-btn" onclick="document.getElementById('load-file-input').click()">Загрузить</button><input type="file" id="load-file-input" accept=".rpgm" onchange="loadProject(event)"></div>
            <div class="toolbar-group"><button class="db-btn" onclick="openDatabase()">База</button></div>
            <button class="play-btn" onclick="startGame()">▶ Играть</button>
            <button class="db-btn" onclick="toggleFullscreen()">⛶</button> <!-- ВОТ ОНА -->
            <div class="toolbar-group" style="border: none;">
                <label style="font-size:11px; color:#888; display:flex; align-items:center; gap:4px; cursor:pointer;">
                    <input type="checkbox" id="admin-toggle" onchange="toggleAdminMode()"> 🛠️Admin
                </label>
            </div>
        </div>
        <div id="workspace">
            <div id="sidebar">
                <div class="sidebar-section"><div class="sidebar-header"><span>Тайлы</span><div style="display:flex; gap:4px;"><button class="eraser-btn" id="eraser-btn" onclick="toggleEraser()">🧹</button><button class="db-btn-sm" style="padding:2px 5px;font-size:10px;" onclick="openDatabase()">+Тайлсет</button></div></div><div class="sidebar-content" id="palette-area"><div id="palette-canvas-container"><canvas id="palette-canvas" width="48" height="48"></canvas><div id="palette-selection"></div></div></div><div class="tileset-tabs" id="tileset-tabs-container"></div></div>
                <div class="sidebar-section" id="map-section"><div class="sidebar-header" onclick="toggleMapList()">Карты <span id="map-toggle-icon">▼</span></div><div class="sidebar-content" id="map-list-container"></div><button id="add-map-btn" onclick="openCreateMapModal()">+ Карта</button></div>
            </div>
            <div id="map-container"><canvas id="editor-canvas"></canvas></div>
        </div>
    </div>

    <div id="game-view">
        <div id="game-canvas-container"><canvas id="game-canvas"></canvas></div>
        <div id="game-message-box">
            <div id="game-message-text"></div>
            <div class="choice-container" id="game-choice-container"></div>
        </div>
        <div id="touch-controls">
            <div class="dpad"><div></div><div class="dpad-btn" data-dir="up">▲</div><div></div><div class="dpad-btn" data-dir="left">◄</div><div></div><div class="dpad-btn" data-dir="right">►</div><div></div><div class="dpad-btn" data-dir="down">▼</div><div></div></div>
            <div class="action-buttons"><div class="action-btn" onclick="gameAction()">E</div><div class="action-btn" onclick="stopGame()">✖</div></div>
        </div>
    </div>

    <div id="overlay" onclick="closeTopModal()"></div>

    <div id="event-modal" class="modal-base">
        <div class="modal-header"><span id="event-modal-title">Событие</span><button class="modal-close-btn" onclick="closeEventModal()">✖</button></div>
        <div class="modal-body">
            <div class="modal-left">
                <div class="ev-input-group"><label>Имя:</label><input type="text" id="event-name-input" placeholder="Имя"></div>
                <div class="event-graphic-box" id="event-graphic-preview"><span style="color:#555;font-size:10px;">Нет графики</span></div>
                <div class="ev-input-group"><label>Графика:</label><select id="event-graphic-select" onchange="updateEventGraphic()"><option value="-1">Нет</option></select></div>
                <div class="ev-row"><div><label>Движение:</label><select id="event-movement-select"><option value="fixed">Статичное</option><option value="random">Случайное</option></select></div><div><label>Слой:</label><select id="event-priority-select"><option value="0">Обычный</option><option value="1">Под игроком</option><option value="2">Над игроком</option></select></div></div>
                <div class="ev-row"><div><label>Проходимость:</label><select id="event-passable-select"><option value="true">Да</option><option value="false">Нет</option></select></div></div>
                <div class="ev-input-group"><label>Активация:</label><select id="event-trigger-select"><option value="action">По кнопке</option><option value="player_touch">Касанием игрока</option><option value="event_touch">Касанием события</option></select></div>
                <div class="ev-input-group"><label>Условие (Глоб. Переключатель):</label><select id="event-condition-sw-select" onchange="handleNewSwitchSelect(this)"><option value="-1">Нет</option></select></div>
                <div class="ev-input-group"><label>Условие (Лок. Переключатель):</label><select id="event-condition-lsw-select"><option value="None">Нет</option><option value="A">A ВКЛ</option><option value="B">B ВКЛ</option><option value="C">C ВКЛ</option><option value="D">D ВКЛ</option></select></div>
                <button class="delete-event-btn" onclick="deleteCurrentEvent()">🗑️ Удалить событие</button>
            </div>
            <div class="modal-right">
                <div class="page-tabs" id="event-page-tabs"></div>
                <div id="script-container" style="flex:1; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="add-cmd-modal" class="modal-base">
        <div class="modal-header"><span id="cmd-modal-title">Добавить команду</span><button class="modal-close-btn" onclick="closeAddCmdModal()">✖</button></div>
        <div id="add-cmd-body">
            <div id="cmd-choices">
                <button class="cmd-choice-btn" onclick="showMessageInput()">💬 Сообщение</button>
                <button class="cmd-choice-btn" onclick="showSwitchInput()">🔧 Переключатель</button>
                <button class="cmd-choice-btn" onclick="showLocalSwitchInput()">⚙️ Лок. Переключатель</button>
                <button class="cmd-choice-btn" onclick="showVariableInput()">🔢 Переменная</button>
                <button class="cmd-choice-btn" onclick="showIfInput()">❓ Условие</button>
                <button class="cmd-choice-btn" onclick="showChoiceInput()">🔀 Выбор</button>
                <button class="cmd-choice-btn" onclick="showTeleportInput()">🚀 Телепорт</button>
            </div>
            <div id="message-input-area"><textarea id="message-textarea"></textarea><button class="save-msg-btn" onclick="saveMessageCommand()">ОК</button></div>
            <div id="switch-input-area"><select id="cmd-switch-select" onchange="handleNewSwitchSelect(this)"></select><div style="display:flex;gap:10px;"><button style="flex:1;background:#4CAF50" onclick="saveSwitchCommand(true)">ВКЛ</button><button style="flex:1;background:#f44336" onclick="saveSwitchCommand(false)">ВЫКЛ</button></div></div>
            <div id="local-switch-input-area"><select id="cmd-lsw-select"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select><div style="display:flex;gap:10px;"><button style="flex:1;background:#4CAF50" onclick="saveLocalSwitchCommand(true)">ВКЛ</button><button style="flex:1;background:#f44336" onclick="saveLocalSwitchCommand(false)">ВЫКЛ</button></div></div>
            <div id="var-input-area"><select id="cmd-var-select"></select><select id="cmd-var-op"><option value="set">Установить</option><option value="add">Прибавить</option><option value="sub">Отнять</option></select><input type="number" id="cmd-var-val" value="1"><button class="save-msg-btn" onclick="saveVariableCommand()">ОК</button></div>
            <div id="if-input-area"><select id="cmd-if-type" onchange="toggleIfUI()"><option value="switch">Если Переключатель</option><option value="local_switch">Если Лок. Переключатель</option><option value="variable">Если Переменная</option></select><div id="if-sw-params"><select id="cmd-if-sw-select" onchange="handleNewSwitchSelect(this)"></select><select id="cmd-if-sw-val"><option value="true">ВКЛ</option><option value="false">ВЫКЛ</option></select></div><div id="if-lsw-params" style="display:none"><select id="cmd-if-lsw-select"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select><select id="cmd-if-lsw-val"><option value="true">ВКЛ</option><option value="false">ВЫКЛ</option></select></div><div id="if-var-params" style="display:none"><select id="cmd-if-var-select"></select><select id="cmd-if-var-op"><option value="==">Равно</option><option value=">">Больше</option><option value="<">Меньше</option></select><input type="number" id="cmd-if-var-val" value="0"></div><button class="save-msg-btn" onclick="saveIfCommand()">ОК</button></div>
            <div id="choice-input-area"><input type="text" id="cmd-choice-1" placeholder="Выбор 1"><input type="text" id="cmd-choice-2" placeholder="Выбор 2"><input type="text" id="cmd-choice-3" placeholder="Выбор 3 (пусто = нет)"><input type="text" id="cmd-choice-4" placeholder="Выбор 4 (пусто = нет)"><div style="display:flex; gap:10px; align-items:center;"><label>При отмене:</label><select id="cmd-choice-cancel"><option value="-1">Игнорировать</option><option value="0">Выбор 1</option><option value="1">Выбор 2</option><option value="2">Выбор 3</option><option value="3">Выбор 4</option></select></div><button class="save-msg-btn" onclick="saveChoiceCommand()">ОК</button></div>
            <div id="teleport-input-area">
                <div class="teleport-layout">
                    <select id="cmd-teleport-map" class="teleport-map-select" onchange="renderTeleportPreview()"></select>
                    <div class="teleport-preview-container"><canvas id="teleport-preview-canvas"></canvas></div>
                    <div class="teleport-coords-display" id="teleport-coords-display">Координаты: X: 0, Y: 0</div>
                    <button class="save-msg-btn" onclick="saveTeleportCommand()">ОК</button>
                </div>
            </div>
            <button id="delete-cmd-btn" onclick="deleteEditingCommand()">❌ Удалить эту команду (и вложенные)</button>
        </div>
    </div>

    <div id="create-map-modal" class="modal-base"><div class="modal-header"><span>Новая карта</span><button class="modal-close-btn" onclick="closeCreateMapModal()">✖</button></div><div id="create-map-body"><div class="map-input-group"><label>Имя:</label><input type="text" id="new-map-name" value="MAP002"></div><div class="map-input-group"><label>Ширина:</label><input type="number" id="new-map-width" value="17"></div><div class="map-input-group"><label>Высота:</label><input type="number" id="new-map-height" value="13"></div><button class="create-map-save-btn" onclick="saveMapOrCreate()">Создать</button></div></div>

    <div id="database-modal" class="modal-base"><div class="modal-header"><span>🗄️ База данных</span><button class="modal-close-btn" onclick="closeDatabase()">✖</button></div><div id="db-body"><div id="db-tabs"><div class="db-tab active" onclick="switchDbTab('player')">Игрок</div><div class="db-tab" onclick="switchDbTab('tilesets')">Тайлсеты</div><div class="db-tab" onclick="switchDbTab('characters')">Персонажи</div><div class="db-tab" onclick="switchDbTab('switches')">Переключатели</div><div class="db-tab" onclick="switchDbTab('variables')">Переменные</div></div><div id="db-content"></div></div></div>
    
    <input type="file" id="import-tileset-input" accept="image/*" onchange="handleTilesetImport(event)">
    <input type="file" id="import-char-input" accept="image/*" onchange="handleCharImport(event)">
    <input type="file" id="import-face-input" accept="image/*" onchange="handleFaceImport(event)">

    <script>
        const TILE_SIZE = 48;
        const DEFAULT_RTP = { 
            tilesets: [ { id: 1, name: "Стандарт A", path: "img/tilesets/A.png", passability: {} }, { id: 2, name: "Стандарт B", path: "img/tilesets/B.png", passability: {} }, { id: 3, name: "Стандарт C", path: "img/tilesets/C.png", passability: {} } ], 
            characters: [ { id: 1, name: "Герой", path: "img/characters/Hero.png" } ],
            faces: [ { name: "Герой", path: "img/faces/Hero.png" } ]
        };

        let projectTilesets = [], projectCharacters = [];
        let projectPlayer = { name: "Герой", graphicCharId: 1, graphicCharIndex: 0, faceSrc: "", faceImg: null };
        let activeTilesetId = 1;
        let gameSwitches = [ { id: 1, name: "Переключатель 1", state: false } ];
        let gameVariables = [ { id: 1, name: "Золото", value: 0 } ];
        let currentMode = 'tile', isDrawing = false;
        let maps = [], currentMapIndex = 0, currentEditEventKey = null, activeLineIndex = 0;
        let isEditingCommand = false, editCommandIndex = -1;
        let currentEventPageIndex = 0;
        const PLAYER_SPEED = 4; const EVENT_SPEED = 4;  
        let isPlaying = false, isMessageShowing = false, isExecutingEvent = false, keysPressed = {}, gameLoopId = null;
        let isPlayerMoving = false;
        let playerGridX = 0, playerGridY = 0, playerVisualX = 0, playerVisualY = 0, playerDir = 0, playerAnimFrame = 1, playerMoveStep = 0;
        let gameEventStates = {}, currentExecutingEventKey = null; 
        let isChoosing = false, selectedChoiceIndex = 0, currentChoices = [], choiceResolve = null;
        let isDraggingEvent = false, draggedEventKey = null, lastClickTime = 0, lastClickKey = "";
        let isAdminMode = false; 
        let teleportTargetX = 0, teleportTargetY = 0; 

        let selectedArea = { x: 0, y: 0, w: 1, h: 1 }; 
        let paletteCols = 1; 
        let isDraggingPalette = false;
        let paletteDragStart = { x: 0, y: 0 };
        let isEraserActive = false;

        let editorZoomLevels = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4];
        let editorZoomIndex = 3;
        let editorZoom = 1;
        let editingMapIndex = -1;

        const editorCanvas = document.getElementById('editor-canvas'); const editorCtx = editorCanvas.getContext('2d');
        const gameCanvas = document.getElementById('game-canvas'); const gameCtx = gameCanvas.getContext('2d');
        const paletteCanvas = document.getElementById('palette-canvas'); const paletteCtx = paletteCanvas.getContext('2d');
        const teleportCanvas = document.getElementById('teleport-preview-canvas'); const teleportCtx = teleportCanvas.getContext('2d');

        function loadRTP() { 
            return new Promise(async (resolve) => { 
                let promises = []; 
                DEFAULT_RTP.tilesets.forEach(defTs => { projectTilesets.push({ id: defTs.id, name: defTs.name, imageSrc: defTs.path, image: null, passability: defTs.passability, isDefault: true }); promises.push(new Promise(res => { const img = new Image(); img.onload = () => { const ts = projectTilesets.find(t => t.id === defTs.id); if(ts) ts.image = img; res(); }; img.onerror = () => res(); img.src = defTs.path; })); }); 
                DEFAULT_RTP.characters.forEach(defCh => { projectCharacters.push({ id: defCh.id, name: defCh.name, imageSrc: defCh.path, image: null, isDefault: true }); promises.push(new Promise(res => { const img = new Image(); img.onload = () => { const ch = projectCharacters.find(c => c.id === defCh.id); if(ch) ch.image = img; res(); }; img.onerror = () => res(); img.src = defCh.path; })); }); 
                if (DEFAULT_RTP.faces.length > 0) { const defFace = DEFAULT_RTP.faces[0]; projectPlayer.faceSrc = defFace.path; promises.push(new Promise(res => { const img = new Image(); img.onload = () => { projectPlayer.faceImg = img; res(); }; img.onerror = () => res(); img.src = defFace.path; })); } 
                await Promise.all(promises); 
                const savedDefaults = localStorage.getItem('rpgmaker_default_passability');
                if (savedDefaults) { try { const defaultPass = JSON.parse(savedDefaults); projectTilesets.forEach(ts => { if (defaultPass[ts.id]) { ts.passability = defaultPass[ts.id]; } }); } catch(e) {} }
                resolve(); 
            }); 
        }
        
        function ensureLayerFormat(m) { for(let y=0; y<m.height; y++) for(let x=0; x<m.width; x++) if (typeof m.mapData[y][x] === 'string') { let old = m.mapData[y][x]; let arr = ["0", "0", "0"]; if (old !== "0") { let tsId = parseInt(old.substring(1).split('_')[0]); if (tsId >= 1 && tsId <= 3) arr[tsId-1] = old; else arr[0] = old; } m.mapData[y][x] = arr; } }
        function ensureEventPages(ev) { if (!ev.pages) { ev.pages = [{ conditionSwitchId: ev.conditionSwitchId !== undefined ? ev.conditionSwitchId : -1, conditionLocalSwitch: "None", graphicCharId: ev.graphicCharId !== undefined ? ev.graphicCharId : -1, graphicCharIndex: ev.graphicCharIndex !== undefined ? ev.graphicCharIndex : 0, movement: ev.movement || "fixed", passable: ev.passable !== undefined ? ev.passable : false, priority: ev.priority !== undefined ? ev.priority : 0, trigger: ev.trigger || "action", commands: ev.commands || [] }]; } delete ev.conditionSwitchId; delete ev.graphicCharId; delete ev.graphicCharIndex; delete ev.movement; delete ev.passable; delete ev.priority; delete ev.trigger; delete ev.commands; }

        async function init() { 
            await loadRTP(); 
            document.getElementById('loading-screen').style.display = 'none'; 
            let defaultMapData = createEmptyMap(17, 13); 
            for(let y=0; y<13; y++) for(let x=0; x<17; x++) defaultMapData[y][x][0] = "T1_1"; 
            for(let x=0; x<17; x++) { defaultMapData[0][x][0] = "T1_2"; defaultMapData[12][x][0] = "T1_2"; } 
            for(let y=0; y<13; y++) { defaultMapData[y][0][0] = "T1_2"; defaultMapData[y][16][0] = "T1_2"; } 
            maps.push({mapId: 'map_' + Date.now(), name: "MAP001", width: 17, height: 13, mapData: defaultMapData, eventsData: {}, playerStartPos: {x: 8, y: 8} }); 
            currentMapIndex = 0; 
            switchMap(0); 
            
            // ИСПРАВЛЕНО: Рисуем вкладки и тайлы при первом запуске
            renderTilesetTabs(); 
            renderPalette();     
            
            setupTouchControls(); 
        }
        function createEmptyMap(w, h) { let d=[]; for(let y=0;y<h;y++){d[y]=[];for(let x=0;x<w;x++)d[y][x]=["0","0","0"];} return d; }
        function getCurrentMap() { return maps[currentMapIndex]; }

        function renderTilesetTabs() { const c = document.getElementById('tileset-tabs-container'); c.innerHTML = ''; const letters = 'ABC'; projectTilesets.forEach((ts, i) => { const tab = document.createElement('div'); tab.className = 'tileset-tab' + (ts.id === activeTilesetId ? ' active' : ''); tab.innerText = letters[i] || ts.name; tab.onclick = () => { activeTilesetId = ts.id; isEraserActive = false; document.getElementById('eraser-btn').classList.remove('active'); selectedArea = {x:0,y:0,w:1,h:1}; renderTilesetTabs(); renderPalette(); }; c.appendChild(tab); }); }
        function renderPalette() { const ts = projectTilesets.find(t => t.id === activeTilesetId); if (!ts || !ts.image) { paletteCanvas.width = 48; paletteCanvas.height = 48; paletteCtx.fillStyle = '#333'; paletteCtx.fillRect(0,0,48,48); return; } const containerWidth = document.getElementById('palette-canvas-container').clientWidth; paletteCols = Math.max(1, Math.floor(containerWidth / TILE_SIZE)); const imgW = ts.image.width / TILE_SIZE; const imgH = ts.image.height / TILE_SIZE; const numChunks = Math.ceil(imgW / paletteCols); const newW = paletteCols * TILE_SIZE; const newH = numChunks * imgH * TILE_SIZE; paletteCanvas.width = newW; paletteCanvas.height = newH; paletteCtx.clearRect(0, 0, newW, newH); for (let origY = 0; origY < imgH; origY++) { for (let origX = 0; origX < imgW; origX++) { const chunkIndex = Math.floor(origX / paletteCols); const localX = origX % paletteCols; const srcX = origX * TILE_SIZE; const srcY = origY * TILE_SIZE; const destX = localX * TILE_SIZE; const destY = (chunkIndex * imgH + origY) * TILE_SIZE; paletteCtx.drawImage(ts.image, srcX, srcY, TILE_SIZE, TILE_SIZE, destX, destY, TILE_SIZE, TILE_SIZE); } } updatePaletteSelection(); }
        function updatePaletteSelection() { const sel = document.getElementById('palette-selection'); if (isEraserActive) { sel.style.display = 'none'; return; } sel.style.display = 'block'; sel.style.left = selectedArea.x * TILE_SIZE + 'px'; sel.style.top = selectedArea.y * TILE_SIZE + 'px'; sel.style.width = selectedArea.w * TILE_SIZE + 'px'; sel.style.height = selectedArea.h * TILE_SIZE + 'px'; }
        function startPaletteDrag(e) { const rect = paletteCanvas.getBoundingClientRect(); const clientX = e.clientX || (e.touches && e.touches[0].clientX); const clientY = e.clientY || (e.touches && e.touches[0].clientY); const x = Math.floor((clientX - rect.left) * (paletteCanvas.width / rect.width) / TILE_SIZE); const y = Math.floor((clientY - rect.top) * (paletteCanvas.height / rect.height) / TILE_SIZE); if (x >= 0 && y >= 0) { isDraggingPalette = true; paletteDragStart = { x, y }; selectedArea = { x, y, w: 1, h: 1 }; isEraserActive = false; document.getElementById('eraser-btn').classList.remove('active'); updatePaletteSelection(); } }
        function movePaletteDrag(e) { if (!isDraggingPalette) return; e.preventDefault(); const rect = paletteCanvas.getBoundingClientRect(); const clientX = e.clientX || (e.touches && e.touches[0].clientX); const clientY = e.clientY || (e.touches && e.touches[0].clientY); let x = Math.floor((clientX - rect.left) * (paletteCanvas.width / rect.width) / TILE_SIZE); let y = Math.floor((clientY - rect.top) * (paletteCanvas.height / rect.height) / TILE_SIZE); x = Math.max(0, Math.min(x, paletteCols - 1)); y = Math.max(0, Math.min(y, (paletteCanvas.height / TILE_SIZE) - 1)); selectedArea.x = Math.min(paletteDragStart.x, x); selectedArea.y = Math.min(paletteDragStart.y, y); selectedArea.w = Math.abs(x - paletteDragStart.x) + 1; selectedArea.h = Math.abs(y - paletteDragStart.y) + 1; updatePaletteSelection(); }
        function endPaletteDrag() { isDraggingPalette = false; }

+ 1; j < commands.length; j++) { const subCmd = commands[j]; if (subCmd && subCmd.type === 'if_start') depth++; else if (subCmd && subCmd.type === 'if_end') { depth--; if (depth === 0) { i = j; break; } } if (depth === 1 && subCmd && subCmd.type === 'else') { inTrueBlock = false; continue; } if (inTrueBlock) trueBlock.push(subCmd); else falseBlock.push(subCmd); } if (conditionMet) { await executeCommands(trueBlock); } else { await executeCommands(falseBlock); } } else if (cmd.type === 'choice') { const chosenIndex = await showAsyncChoice(cmd.choices, cmd.cancelType); let branchStart = -1; let branchEnd = -1; let depth = 1; for (let j = i + 1; j < commands.length; j++) { const sub = commands[j]; if (sub && sub.type === 'choice') depth++; else if (sub && sub.type === 'choice_end') { depth--; if (depth === 0) { branchEnd = j; break; } } else if (sub && sub.type === 'choice_branch' && depth === 1) { if (sub.branchIndex === chosenIndex) branchStart = j; else if (branchStart !== -1 && sub.branchIndex > chosenIndex) { branchEnd = j; break; } } } if (branchStart !== -1 && branchEnd !== -1) { const block = commands.slice(branchStart + 1, branchEnd); await executeCommands(block); } depth = 1; for (let j = i + 1; j < commands.length; j++) { const sub = commands[j]; if (sub && sub.type === 'choice') depth++; else if (sub && sub.type === 'choice_end') { depth--; if (depth === 0) { i = j; break; } } } } } }
        document.addEventListener('keydown', (e) => { if (!isPlaying) return; if (isChoosing) { if (e.key === 'ArrowUp') { selectedChoiceIndex = (selectedChoiceIndex - 1 + currentChoices.length) % currentChoices.length; updateChoiceSelection(); e.preventDefault(); } else if (e.key === 'ArrowDown') { selectedChoiceIndex = (selectedChoiceIndex + 1) % currentChoices.length; updateChoiceSelection(); e.preventDefault(); } else if (e.key === 'Enter' || e.key === ' ' || e.key === 'e' || e.key === 'у') { if (choiceResolve) { isChoosing = false; isMessageShowing = false; document.getElementById('game-message-box').style.display = 'none'; choiceResolve(selectedChoiceIndex); choiceResolve = null; } } return; } keysPressed[e.key] = true; if (e.key === ' ' || e.key === 'e' || e.key === 'у') gameAction(); if (e.key === 'Escape') stopGame(); });
        document.addEventListener('keyup', (e) => { keysPressed[e.key] = false; });
        function setupTouchControls() { document.querySelectorAll('.dpad-btn').forEach(btn => { const dir = btn.dataset.dir; const keyMap = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }; btn.addEventListener('touchstart', (e) => { e.preventDefault(); keysPressed[keyMap[dir]] = true; }); btn.addEventListener('touchend', (e) => { e.preventDefault(); keysPressed[keyMap[dir]] = false; }); btn.addEventListener('mousedown', (e) => { keysPressed[keyMap[dir]] = true; }); btn.addEventListener('mouseup', (e) => { keysPressed[keyMap[dir]] = false; }); btn.addEventListener('mouseleave', (e) => { keysPressed[keyMap[dir]] = false; }); }); }
