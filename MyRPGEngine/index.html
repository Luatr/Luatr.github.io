<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мини RPG Maker Engine</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #2b2b2b; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* --- РЕДАКТОР --- */
        #editor-view { display: flex; flex-direction: column; height: 100%; }
        #toolbar { background-color: #1e1e1e; padding: 8px; display: flex; gap: 8px; align-items: center; border-bottom: 2px solid #444; flex-wrap: wrap; }
        .toolbar-group { display: flex; gap: 5px; align-items: center; border-right: 1px solid #555; padding-right: 8px; }
        #toolbar input { width: 45px; padding: 4px; background: #333; color: white; border: 1px solid #555; }
        #toolbar button { padding: 5px 8px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 13px; }
        .mode-btn { font-size: 18px !important; padding: 5px 8px !important; background-color: #555 !important; }
        .mode-btn.active { background-color: #2196F3 !important; }
        .play-btn { background-color: #ff9800 !important; font-weight: bold; }
        .save-btn { background-color: #2196F3 !important; }
        .load-btn { background-color: #00bcd4 !important; }

        #workspace { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 220px; background-color: #333; border-right: 2px solid #444; display: flex; flex-direction: column; }
        .sidebar-section { display: flex; flex-direction: column; height: 50%; }
        .sidebar-section:first-child { border-bottom: 1px solid #555; }
        .sidebar-header { text-align: center; padding: 5px; background-color: #222; font-weight: bold; font-size: 12px; border-bottom: 1px solid #555; display: flex; justify-content: space-between; align-items: center;}
        .sidebar-content { flex: 1; overflow-y: auto; padding: 0; position: relative; background: #111; }
        
        #palette-canvas-container { width: 100%; overflow: auto; position: relative; }
        #palette-canvas { image-rendering: pixelated; cursor: crosshair; display: block; }
        #palette-selection { position: absolute; border: 2px solid yellow; pointer-events: none; width: 48px; height: 48px; top: 0; left: 0; box-sizing: border-box; }

        .tileset-tabs { display: flex; background-color: #222; border-top: 1px solid #555; }
        .tileset-tab { flex: 1; text-align: center; padding: 5px 0; cursor: pointer; font-size: 14px; color: #aaa; font-weight: bold; }
        .tileset-tab.active { background-color: #444; color: white; }

        .map-item { display: flex; align-items: center; gap: 5px; padding: 6px; cursor: pointer; font-size: 12px; color: #ccc; border-bottom: 1px solid #444; }
        .map-item.active { background-color: #3a3a5a; color: white; border-left: 3px solid #2196F3; }
        #add-map-btn { width: 100%; padding: 8px; background-color: #555; color: white; border: none; border-top: 1px solid #777; cursor: pointer; }

        #map-container { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; align-items: flex-start; background-color: #111; }
        #editor-canvas { image-rendering: pixelated; touch-action: none; background-color: #222; background-image: linear-gradient(45deg, #2a2a2a 25%, transparent 25%, transparent 75%, #2a2a2a 75%, #2a2a2a), linear-gradient(45deg, #2a2a2a 25%, transparent 25%, transparent 75%, #2a2a2a 75%, #2a2a2a); background-size: 24px 24px; background-position: 0 0, 12px 12px;}

        /* --- ИГРОВОЙ РЕЖИМ --- */
        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 500; flex-direction: column; }
        #game-canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #game-canvas { image-rendering: pixelated; }
        
        /* Стиль окна сообщений в стиле RM2K3 */
        #game-message-box { display: none; position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; background-color: rgba(0, 0, 0, 0.9); border: 3px solid #fff; border-radius: 8px; padding: 20px; color: white; font-size: 20px; line-height: 1.4; z-index: 600; flex-direction: column; }
        #game-message-text { white-space: pre-wrap; margin-bottom: 10px; }
        .choice-container { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; border-top: 2px solid rgba(255,255,255,0.3); padding-top: 10px; }
        .choice-item { background: rgba(255,255,255,0.1); border: 2px solid #fff; padding: 10px; cursor: pointer; text-align: center; border-radius: 5px; font-size: 18px; }
        .choice-item:active { background: #4CAF50; color: black; }

        #touch-controls { height: 150px; background-color: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .dpad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 5px; }
        .dpad-btn { background-color: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5); border-radius: 10px; color: white; font-size: 24px; display: flex; justify-content: center; align-items: center; user-select: none; }
        .action-buttons { display: flex; gap: 15px; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; background-color: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5); color: white; font-size: 24px; display: flex; justify-content: center; align-items: center; user-select: none; }

        /* --- МОДАЛЬНЫЕ ОКНА --- */
        .modal-base { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #2b2b2b; border: 2px solid #888; box-shadow: 0 0 20px rgba(0,0,0,0.8); flex-direction: column; z-index: 100; max-height: 90vh; }
        .modal-base.active { display: flex; }
        .modal-header { background-color: #444; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #666; flex-shrink: 0; }
        .modal-close-btn { background: red; color: white; border: none; cursor: pointer; padding: 2px 8px; }
        .modal-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        #event-modal { width: 750px; height: 550px; }
        .modal-left { width: 260px; background-color: #333; padding: 10px; border-right: 1px solid #666; display: flex; flex-direction: column; gap: 6px; overflow-y: auto;}
        .ev-input-group { display: flex; flex-direction: column; gap: 2px; font-size: 12px; }
        .ev-input-group input, .ev-input-group select { width: 100%; padding: 4px; background: #111; color: white; border: 1px solid #555; box-sizing: border-box; }
        .ev-row { display: flex; gap: 5px; }
        .ev-row > div { flex: 1; display: flex; flex-direction: column; gap: 2px; font-size: 12px; }
        
        .event-graphic-box { width: 100%; min-height: 100px; max-height: 150px; background-color: #111; border: 1px solid #555; margin: 0 auto; display:flex; justify-content:center; align-items:flex-start; overflow:auto; position:relative; }
        .char-sheet-container { position: relative; display: inline-block; cursor: crosshair; }
        .char-sheet-container img { image-rendering: pixelated; display: block; width: 100%; max-width: 400px; height: auto; } 
        .char-selection-overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:grid; pointer-events:none; }
        .char-cell { border: 2px solid rgba(255,255,255,0.2); pointer-events: auto; cursor: crosshair; box-sizing: border-box; }
        .char-cell.active { border: 3px solid yellow; background: rgba(255,255,0,0.3); }
        
        .delete-event-btn { margin-top: auto; background-color: #d9534f !important; font-size: 16px; padding: 8px !important; width: 100%; border: none; cursor: pointer; color: white;}
        
        .modal-right { flex: 1; background-color: #f0f0f0; padding: 0; overflow-y: auto; position: relative; display: flex; flex-direction: column; }
        .script-line { min-height: 30px; border-bottom: 1px solid #ccc; display: flex; align-items: center; padding: 0 5px; color: #333; font-family: monospace; font-size: 12px; box-sizing: border-box; transition: padding-left 0.2s; cursor: pointer; }
        .script-line:hover { background-color: #e0e0ff; }
        .script-line.empty-line { background-color: #eef; color: #888; font-style: italic; }
        
        .cmd-message { background-color: #fff; border: 1px solid #aaa; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; }
        .cmd-switch { background-color: #e1f5fe; border: 1px solid #0288d1; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; }
        .cmd-variable { background-color: #e8f5e9; border: 1px solid #388e3c; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; }
        .cmd-teleport { background-color: #f3e5f5; border: 1px solid #9c27b0; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; }
        .cmd-if { background-color: #fff3e0; border: 1px solid #f57c00; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; font-weight: bold;}
        .cmd-else { background-color: #eeeeee; border: 1px solid #757575; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; font-weight: bold; cursor: default !important; }
        .cmd-if-end { background-color: #eeeeee; border: 1px solid #757575; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; font-weight: bold; cursor: default !important; }
        .cmd-choice { background-color: #ffe0b2; border: 1px solid #ff9800; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; font-weight: bold; }
        .cmd-choice-branch { background-color: #fff9c4; border: 1px solid #fbc02d; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; }
        .cmd-choice-end { background-color: #eeeeee; border: 1px solid #757575; padding: 2px 5px; border-radius: 3px; width: 100%; display:block; font-weight: bold; cursor: default !important; }

        .page-tabs { display: flex; background: #222; border-bottom: 2px solid #444; flex-shrink: 0; }
        .page-tab { padding: 8px 15px; cursor: pointer; color: #aaa; font-weight: bold; border-right: 1px solid #444; }
        .page-tab.active { background: #3a3a5a; color: white; }
        .add-page-tab { margin-left: auto; padding: 8px 15px; cursor: pointer; color: #4CAF50; font-weight: bold; }

        #add-cmd-modal { width: 500px; height: auto; z-index: 150; max-height: 80vh; }
        #add-cmd-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; max-height: calc(80vh - 50px); }
        #cmd-choices { display: grid; grid-template-columns: 1fr 1fr; background: #222; border: 1px solid #555; max-height: 250px; overflow-y: auto; }
        .cmd-choice-btn { background-color: #333; color: #ddd; border: 1px solid #444; padding: 10px; cursor: pointer; text-align: left; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .cmd-choice-btn:hover { background-color: #444; color: #fff; }

        #message-input-area, #switch-input-area, #var-input-area, #if-input-area, #teleport-input-area, #local-switch-input-area, #choice-input-area { display: none; flex-direction: column; gap: 10px; background: #333; padding: 10px; border:1px solid #555; }
        #message-input-area.active, #switch-input-area.active, #var-input-area.active, #if-input-area.active, #teleport-input-area.active, #local-switch-input-area.active, #choice-input-area.active { display: flex; }
        #message-textarea { height: 80px; background-color: #111; color: #0f0; border: 1px solid #555; padding: 10px; font-family: monospace; resize: none; }
        .save-msg-btn { background-color: #5cb85c; color: white; border: none; padding: 8px; cursor: pointer; }
        #switch-input-area select, #switch-input-area button, #var-input-area select, #var-input-area input, #var-input-area button, #if-input-area select, #if-input-area input, #if-input-area button, #teleport-input-area select, #teleport-input-area input, #teleport-input-area button, #local-switch-input-area select, #local-switch-input-area button, #choice-input-area input, #choice-input-area select, #choice-input-area button { padding: 8px; background: #111; color: white; border: 1px solid #555; }
        #delete-cmd-btn { display: none; background-color: #d9534f; color: white; border: none; padding: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }

        #create-map-modal { width: 300px; height: auto; z-index: 150; }
        #create-map-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .map-input-group { display: flex; flex-direction: column; gap: 5px; }
        .map-input-group input { padding: 8px; background: #222; color: white; border: 1px solid #555; }
        .create-map-save-btn { background-color: #5cb85c; color: white; border: none; padding: 10px; cursor: pointer; font-size: 16px; }

        #database-modal { width: 700px; height: 600px; z-index: 150; }
        #db-body { padding: 15px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; overflow: hidden; }
        #db-tabs { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; flex-shrink: 0; }
        .db-tab { padding: 5px 15px; background: #555; cursor: pointer; border-radius: 3px 3px 0 0; }
        .db-tab.active { background: #2196F3; }
        #db-content { flex: 1; overflow-y: auto; background: #222; padding: 15px; border: 1px solid #555; border-top: none; }
        .db-switch-item, .db-var-item { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .db-switch-item input, .db-var-item input { flex:1; padding: 5px; background: #111; color: white; border: 1px solid #555; }
        .db-tileset-card, .db-char-card { background: #333; padding: 15px; margin-bottom: 15px; border: 1px solid #555; }
        .db-tileset-header, .db-char-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .db-btn-sm { padding: 5px 10px; border: none; cursor: pointer; color: white; background: #2196F3; }
        .db-tile-img-container { position: relative; display: inline-block; border: 1px solid #000; background: #111; max-width: 100%; }
        .db-tile-img-container img { display: block; image-rendering: pixelated; max-width: 100%; height: auto; }
        .db-tile-grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; pointer-events: none; }
        .db-tile-cell { border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; align-items: flex-start; cursor: pointer; pointer-events: auto; }
        .db-tile-cell:hover { border-color: yellow; background: rgba(255,255,0,0.2); }
        .pass-icon { font-weight: bold; text-shadow: 1px 1px 0 #000; font-size: 14px; pointer-events: none; }
        .db-char-preview { width: 48px; height: 48px; image-rendering: pixelated; background: #111; border: 1px solid #555; object-fit: cover; }
        .default-badge { background: #555; color: #0f0; font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-left: 10px; }
        
        .db-player-section { display: flex; gap: 20px; }
        .db-player-form { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .db-player-avatar-box { width: 160px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .db-avatar-preview { width: 144px; height: 144px; background: #111; border: 1px solid #555; object-fit: cover; image-rendering: pixelated; }

        #overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.5); z-index: 50; }
        #overlay.active { display: block; }
        #load-file-input, #import-tileset-input, #import-char-input, #import-face-input { display: none; }
        
        #loading-screen { position: fixed; top:0;left:0;width:100%;height:100%;background:#2b2b2b;color:white;display:flex;justify-content:center;align-items:center;font-size:24px;z-index:9999; flex-direction: column;}
    </style>
</head>
<body>

    <div id="loading-screen">Загрузка ассетов...<br><small>Убедитесь, что папки img/tilesets, img/characters, img/faces существуют</small></div>

    <div id="editor-view">
        <div id="toolbar">
            <div class="toolbar-group"><button class="mode-btn active" id="mode-tile" onclick="setMode('tile')">🖌️</button><button class="mode-btn" id="mode-event" onclick="setMode('event')">📎</button><button class="mode-btn" id="mode-player" onclick="setMode('player')">🧍</button></div>
            <div class="toolbar-group"><label>Ш:</label> <input type="number" id="map-width" value="17" min="1"><label>В:</label> <input type="number" id="map-height" value="13" min="1"><button onclick="applyMapSize()">Размер</button></div>
            <div class="toolbar-group"><button class="save-btn" onclick="saveProject()">💾 Сохранить</button><button class="load-btn" onclick="document.getElementById('load-file-input').click()">📂 Загрузить</button><input type="file" id="load-file-input" accept=".rpgm" onchange="loadProject(event)"></div>
            <div class="toolbar-group"><button class="db-btn" onclick="openDatabase()">🗄️ База</button></div>
            <div class="toolbar-group"><button class="play-btn" onclick="startGame()">▶ Играть</button></div>
        </div>
        <div id="workspace">
            <div id="sidebar">
                <div class="sidebar-section"><div class="sidebar-header"><span>Тайлы</span><button class="db-btn-sm" style="padding:2px 5px;font-size:10px;" onclick="openDatabase()">+Тайлсет</button></div><div class="sidebar-content" id="palette-area"><div id="palette-canvas-container"><canvas id="palette-canvas" width="48" height="48"></canvas><div id="palette-selection"></div></div></div><div class="tileset-tabs" id="tileset-tabs-container"></div></div>
                <div class="sidebar-section"><div class="sidebar-header">Карты</div><div class="sidebar-content" id="map-list-container"></div><button id="add-map-btn" onclick="openCreateMapModal()">+ Карта</button></div>
            </div>
            <div id="map-container"><canvas id="editor-canvas"></canvas></div>
        </div>
    </div>

    <div id="game-view">
        <div id="game-canvas-container"><canvas id="game-canvas"></canvas></div>
        <div id="game-message-box">
            <div id="game-message-text"></div>
            <div class="choice-container" id="game-choice-container"></div>
        </div>
        <div id="touch-controls">
            <div class="dpad"><div></div><div class="dpad-btn" data-dir="up">▲</div><div></div><div class="dpad-btn" data-dir="left">◄</div><div></div><div class="dpad-btn" data-dir="right">►</div><div></div><div class="dpad-btn" data-dir="down">▼</div><div></div></div>
            <div class="action-buttons"><div class="action-btn" onclick="gameAction()">E</div><div class="action-btn" onclick="stopGame()">✖</div></div>
        </div>
    </div>

    <div id="overlay" onclick="closeTopModal()"></div>

    <div id="event-modal" class="modal-base">
        <div class="modal-header"><span id="event-modal-title">Событие</span><button class="modal-close-btn" onclick="closeEventModal()">✖</button></div>
        <div class="modal-body">
            <div class="modal-left">
                <div class="ev-input-group"><label>Имя:</label><input type="text" id="event-name-input" placeholder="Имя"></div>
                <div class="event-graphic-box" id="event-graphic-preview"><span style="color:#555;font-size:10px;">Нет графики</span></div>
                <div class="ev-input-group"><label>Графика:</label><select id="event-graphic-select" onchange="updateEventGraphic()"><option value="-1">Нет</option></select></div>
                <div class="ev-row"><div><label>Движение:</label><select id="event-movement-select"><option value="fixed">Статичное</option><option value="random">Случайное</option></select></div><div><label>Слой:</label><select id="event-priority-select"><option value="0">Обычный</option><option value="1">Под игроком</option><option value="2">Над игроком</option></select></div></div>
                <div class="ev-row"><div><label>Проходимость:</label><select id="event-passable-select"><option value="true">Да</option><option value="false">Нет</option></select></div></div>
                <div class="ev-input-group"><label>Условие (Глоб. Переключатель):</label><select id="event-condition-sw-select"><option value="-1">Нет</option></select></div>
                <div class="ev-input-group"><label>Условие (Лок. Переключатель):</label><select id="event-condition-lsw-select"><option value="None">Нет</option><option value="A">A ВКЛ</option><option value="B">B ВКЛ</option><option value="C">C ВКЛ</option><option value="D">D ВКЛ</option></select></div>
                <button class="delete-event-btn" onclick="deleteCurrentEvent()">🗑️ Удалить событие</button>
            </div>
            <div class="modal-right">
                <div class="page-tabs" id="event-page-tabs"></div>
                <div id="script-container" style="flex:1; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="add-cmd-modal" class="modal-base">
        <div class="modal-header"><span id="cmd-modal-title">Добавить команду</span><button class="modal-close-btn" onclick="closeAddCmdModal()">✖</button></div>
        <div id="add-cmd-body">
            <div id="cmd-choices">
                <button class="cmd-choice-btn" onclick="showMessageInput()">💬 Сообщение</button>
                <button class="cmd-choice-btn" onclick="showSwitchInput()">🔧 Переключатель</button>
                <button class="cmd-choice-btn" onclick="showLocalSwitchInput()">⚙️ Лок. Переключатель</button>
                <button class="cmd-choice-btn" onclick="showVariableInput()">🔢 Переменная</button>
                <button class="cmd-choice-btn" onclick="showIfInput()">❓ Условие</button>
                <button class="cmd-choice-btn" onclick="showChoiceInput()">🔀 Выбор</button>
                <button class="cmd-choice-btn" onclick="showTeleportInput()">🚀 Телепорт</button>
            </div>
            <div id="message-input-area"><textarea id="message-textarea"></textarea><button class="save-msg-btn" onclick="saveMessageCommand()">ОК</button></div>
            <div id="switch-input-area"><select id="cmd-switch-select"></select><div style="display:flex;gap:10px;"><button style="flex:1;background:#4CAF50" onclick="saveSwitchCommand(true)">ВКЛ</button><button style="flex:1;background:#f44336" onclick="saveSwitchCommand(false)">ВЫКЛ</button></div></div>
            <div id="local-switch-input-area"><select id="cmd-lsw-select"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select><div style="display:flex;gap:10px;"><button style="flex:1;background:#4CAF50" onclick="saveLocalSwitchCommand(true)">ВКЛ</button><button style="flex:1;background:#f44336" onclick="saveLocalSwitchCommand(false)">ВЫКЛ</button></div></div>
            <div id="var-input-area"><select id="cmd-var-select"></select><select id="cmd-var-op"><option value="set">Установить</option><option value="add">Прибавить</option><option value="sub">Отнять</option></select><input type="number" id="cmd-var-val" value="1"><button class="save-msg-btn" onclick="saveVariableCommand()">ОК</button></div>
            <div id="if-input-area"><select id="cmd-if-type" onchange="toggleIfUI()"><option value="switch">Если Переключатель</option><option value="local_switch">Если Лок. Переключатель</option><option value="variable">Если Переменная</option></select><div id="if-sw-params"><select id="cmd-if-sw-select"></select><select id="cmd-if-sw-val"><option value="true">ВКЛ</option><option value="false">ВЫКЛ</option></select></div><div id="if-lsw-params" style="display:none"><select id="cmd-if-lsw-select"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select><select id="cmd-if-lsw-val"><option value="true">ВКЛ</option><option value="false">ВЫКЛ</option></select></div><div id="if-var-params" style="display:none"><select id="cmd-if-var-select"></select><select id="cmd-if-var-op"><option value="==">Равно</option><option value=">">Больше</option><option value="<">Меньше</option></select><input type="number" id="cmd-if-var-val" value="0"></div><button class="save-msg-btn" onclick="saveIfCommand()">ОК</button></div>
            <div id="choice-input-area"><input type="text" id="cmd-choice-1" placeholder="Выбор 1"><input type="text" id="cmd-choice-2" placeholder="Выбор 2"><input type="text" id="cmd-choice-3" placeholder="Выбор 3 (пусто = нет)"><input type="text" id="cmd-choice-4" placeholder="Выбор 4 (пусто = нет)"><div style="display:flex; gap:10px; align-items:center;"><label>При отмене:</label><select id="cmd-choice-cancel"><option value="-1">Игнорировать</option><option value="0">Выбор 1</option><option value="1">Выбор 2</option><option value="2">Выбор 3</option><option value="3">Выбор 4</option></select></div><button class="save-msg-btn" onclick="saveChoiceCommand()">ОК</button></div>
            <div id="teleport-input-area"><select id="cmd-teleport-map"></select><div style="display:flex; gap:10px;"><input type="number" id="cmd-teleport-x" value="0" placeholder="X"><input type="number" id="cmd-teleport-y" value="0" placeholder="Y"></div><button class="save-msg-btn" onclick="saveTeleportCommand()">ОК</button></div>
            <button id="delete-cmd-btn" onclick="deleteEditingCommand()">❌ Удалить эту команду (и вложенные)</button>
        </div>
    </div>

    <div id="create-map-modal" class="modal-base"><div class="modal-header"><span>Новая карта</span><button class="modal-close-btn" onclick="closeCreateMapModal()">✖</button></div><div id="create-map-body"><div class="map-input-group"><label>Имя:</label><input type="text" id="new-map-name" value="MAP002"></div><div class="map-input-group"><label>Ширина:</label><input type="number" id="new-map-width" value="17"></div><div class="map-input-group"><label>Высота:</label><input type="number" id="new-map-height" value="13"></div><button class="create-map-save-btn" onclick="createNewMap()">Создать</button></div></div>

    <div id="database-modal" class="modal-base"><div class="modal-header"><span>🗄️ База данных</span><button class="modal-close-btn" onclick="closeDatabase()">✖</button></div><div id="db-body"><div id="db-tabs"><div class="db-tab active" onclick="switchDbTab('player')">Игрок</div><div class="db-tab" onclick="switchDbTab('tilesets')">Тайлсеты</div><div class="db-tab" onclick="switchDbTab('characters')">Персонажи</div><div class="db-tab" onclick="switchDbTab('switches')">Переключатели</div><div class="db-tab" onclick="switchDbTab('variables')">Переменные</div></div><div id="db-content"></div></div></div>
    
    <input type="file" id="import-tileset-input" accept="image/*" onchange="handleTilesetImport(event)">
    <input type="file" id="import-char-input" accept="image/*" onchange="handleCharImport(event)">
    <input type="file" id="import-face-input" accept="image/*" onchange="handleFaceImport(event)">

    <script>
        const TILE_SIZE = 48;
        const DEFAULT_RTP = { 
            tilesets: [ { id: 1, name: "Стандарт A", path: "img/tilesets/A.png", passability: {} }, { id: 2, name: "Стандарт B", path: "img/tilesets/B.png", passability: {} }, { id: 3, name: "Стандарт C", path: "img/tilesets/C.png", passability: {} } ], 
            characters: [ { id: 1, name: "Герой", path: "img/characters/Hero.png" } ],
            faces: [ { name: "Герой", path: "img/faces/Hero.png" } ]
        };

        let projectTilesets = [], projectCharacters = [];
        let projectPlayer = { name: "Герой", graphicCharId: 1, graphicCharIndex: 0, faceSrc: "", faceImg: null };
        let activeTilesetId = 1, selectedTileIndex = 0;
        let gameSwitches = [ { id: 1, name: "Переключатель 1", state: false } ];
        let gameVariables = [ { id: 1, name: "Золото", value: 0 } ];
        let currentMode = 'tile', isDrawing = false;
        let maps = [], currentMapIndex = 0, currentEditEventKey = null, activeLineIndex = 0;
        let isEditingCommand = false, editCommandIndex = -1;
        let currentEventPageIndex = 0;
        const PLAYER_SPEED = 4; const EVENT_SPEED = 4;  
        let isPlaying = false, isMessageShowing = false, isExecutingEvent = false, keysPressed = {}, gameLoopId = null;
        let playerGridX = 0, playerGridY = 0, playerVisualX = 0, playerVisualY = 0, playerDir = 0, playerAnimFrame = 1, playerMoveStep = 0;
        let gameEventStates = {}, currentExecutingEventKey = null; 
        let isDraggingEvent = false, draggedEventKey = null, lastClickTime = 0, lastClickKey = "";

        const editorCanvas = document.getElementById('editor-canvas'); const editorCtx = editorCanvas.getContext('2d');
        const gameCanvas = document.getElementById('game-canvas'); const gameCtx = gameCanvas.getContext('2d');
        const paletteCanvas = document.getElementById('palette-canvas'); const paletteCtx = paletteCanvas.getContext('2d');

        function loadRTP() { return new Promise(async (resolve) => { let promises = []; DEFAULT_RTP.tilesets.forEach(defTs => { projectTilesets.push({ id: defTs.id, name: defTs.name, imageSrc: defTs.path, image: null, passability: defTs.passability, isDefault: true }); promises.push(new Promise(res => { const img = new Image(); img.onload = () => { const ts = projectTilesets.find(t => t.id === defTs.id); if(ts) ts.image = img; res(); }; img.onerror = () => res(); img.src = defTs.path; })); }); DEFAULT_RTP.characters.forEach(defCh => { projectCharacters.push({ id: defCh.id, name: defCh.name, imageSrc: defCh.path, image: null, isDefault: true }); promises.push(new Promise(res => { const img = new Image(); img.onload = () => { const ch = projectCharacters.find(c => c.id === defCh.id); if(ch) ch.image = img; res(); }; img.onerror = () => res(); img.src = defCh.path; })); }); if (DEFAULT_RTP.faces.length > 0) { const defFace = DEFAULT_RTP.faces[0]; projectPlayer.faceSrc = defFace.path; promises.push(new Promise(res => { const img = new Image(); img.onload = () => { projectPlayer.faceImg = img; res(); }; img.onerror = () => res(); img.src = defFace.path; })); } await Promise.all(promises); resolve(); }); }
        function ensureLayerFormat(m) { for(let y=0; y<m.height; y++) for(let x=0; x<m.width; x++) if (typeof m.mapData[y][x] === 'string') { let old = m.mapData[y][x]; let arr = ["0", "0", "0"]; if (old !== "0") { let tsId = parseInt(old.substring(1).split('_')[0]); if (tsId >= 1 && tsId <= 3) arr[tsId-1] = old; else arr[0] = old; } m.mapData[y][x] = arr; } }
        function ensureEventPages(ev) { if (!ev.pages) { ev.pages = [{ conditionSwitchId: ev.conditionSwitchId !== undefined ? ev.conditionSwitchId : -1, conditionLocalSwitch: "None", graphicCharId: ev.graphicCharId !== undefined ? ev.graphicCharId : -1, graphicCharIndex: ev.graphicCharIndex !== undefined ? ev.graphicCharIndex : 0, movement: ev.movement || "fixed", passable: ev.passable !== undefined ? ev.passable : true, priority: ev.priority !== undefined ? ev.priority : 0, commands: ev.commands || [] }]; } delete ev.conditionSwitchId; delete ev.graphicCharId; delete ev.graphicCharIndex; delete ev.movement; delete ev.passable; delete ev.priority; delete ev.commands; }

        async function init() { await loadRTP(); document.getElementById('loading-screen').style.display = 'none'; let defaultMapData = createEmptyMap(17, 13); for(let y=0; y<13; y++) for(let x=0; x<17; x++) defaultMapData[y][x][0] = "T1_1"; for(let x=0; x<17; x++) { defaultMapData[0][x][0] = "T1_2"; defaultMapData[12][x][0] = "T1_2"; } for(let y=0; y<13; y++) { defaultMapData[y][0][0] = "T1_2"; defaultMapData[y][16][0] = "T1_2"; } maps.push({mapId: 'map_' + Date.now(), name: "MAP001", width: 17, height: 13, mapData: defaultMapData, eventsData: {}, playerStartPos: {x: 8, y: 8} }); currentMapIndex = 0; switchMap(0); setupTouchControls(); }
        function createEmptyMap(w, h) { let d=[]; for(let y=0;y<h;y++){d[y]=[];for(let x=0;x<w;x++)d[y][x]=["0","0","0"];} return d; }
        function getCurrentMap() { return maps[currentMapIndex]; }

        function renderTilesetTabs() { const c = document.getElementById('tileset-tabs-container'); c.innerHTML = ''; const letters = 'ABC'; projectTilesets.forEach((ts, i) => { const tab = document.createElement('div'); tab.className = 'tileset-tab' + (ts.id === activeTilesetId ? ' active' : ''); tab.innerText = letters[i] || ts.name; tab.onclick = () => { activeTilesetId = ts.id; selectedTileIndex = 0; renderTilesetTabs(); renderPalette(); }; c.appendChild(tab); }); }
        function renderPalette() { const ts = projectTilesets.find(t => t.id === activeTilesetId); if (!ts || !ts.image) { paletteCanvas.width = 48; paletteCanvas.height = 48; paletteCtx.fillStyle = '#333'; paletteCtx.fillRect(0,0,48,48); return; } paletteCanvas.width = ts.image.width; paletteCanvas.height = ts.image.height; paletteCtx.clearRect(0,0, paletteCanvas.width, paletteCanvas.height); paletteCtx.drawImage(ts.image, 0, 0); updatePaletteSelection(); }
        function updatePaletteSelection() { const ts = projectTilesets.find(t => t.id === activeTilesetId); const sel = document.getElementById('palette-selection'); if (!ts || !ts.image || selectedTileIndex === 0) { sel.style.display = 'none'; return; } sel.style.display = 'block'; const imgW = ts.image.width / TILE_SIZE; sel.style.left = ((selectedTileIndex - 1) % imgW) * TILE_SIZE + 'px'; sel.style.top = Math.floor((selectedTileIndex - 1) / imgW) * TILE_SIZE + 'px'; }
        paletteCanvas.addEventListener('mousedown', (e) => { selectTileFromPalette(e); }); paletteCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); selectTileFromPalette(e.touches[0]); });
        function selectTileFromPalette(e) { const rect = paletteCanvas.getBoundingClientRect(); const x = (e.clientX - rect.left) * (paletteCanvas.width / rect.width); const y = (e.clientY - rect.top) * (paletteCanvas.height / rect.height); selectedTileIndex = (Math.floor(y / TILE_SIZE) * (paletteCanvas.width / TILE_SIZE) + Math.floor(x / TILE_SIZE)) + 1; updatePaletteSelection(); }

        function drawMapOnCanvas(ctx, m, isGame, drawOverhead) { for(let layerIdx = 0; layerIdx < 3; layerIdx++) { for(let y=0; y<m.height; y++) { for(let x=0; x<m.width; x++) { const tileStr = m.mapData[y][x][layerIdx]; if(tileStr !== "0") { const parts = tileStr.split('_'); const tsId = parseInt(parts[0].substring(1)); const tIdx = parseInt(parts[1]); const ts = projectTilesets.find(t => t.id === tsId); if(ts && ts.image) { const pass = ts.passability[tIdx] || 0; if (!drawOverhead && pass === 2) continue; if (drawOverhead && pass !== 2) continue; const imgW = ts.image.width / TILE_SIZE; const srcX = ((tIdx - 1) % imgW) * TILE_SIZE; const srcY = Math.floor((tIdx - 1) / imgW) * TILE_SIZE; try { ctx.drawImage(ts.image, srcX, srcY, TILE_SIZE, TILE_SIZE, x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); } catch(e) {} } } }} } }
        
        function drawCharacter(ctx, char, index, destX, destY, dir, frame) { 
            if(!char || !char.image || char.image.width === 0) return false; 
            const colsPerChar = 4; const rowsPerChar = 4; 
            const charsPerRow = Math.floor(char.image.width / (TILE_SIZE * colsPerChar)) || 1; 
            const charsPerCol = Math.floor(char.image.height / (TILE_SIZE * rowsPerChar)) || 1;
            if (charsPerRow === 0 || charsPerCol === 0) return false;
            index = index % (charsPerRow * charsPerCol); // Защита от выхода за пределы
            const baseCol = (index % charsPerRow) * colsPerChar;
            const baseRow = Math.floor(index / charsPerRow) * rowsPerChar;
            const actualFrame = [1, 0, 1, 2][frame % 4]; 
            const srcX = (baseCol + actualFrame) * TILE_SIZE; 
            const srcY = (baseRow + dir) * TILE_SIZE; 
            if (srcX < 0 || srcY < 0 || srcX + TILE_SIZE > char.image.width || srcY + TILE_SIZE > char.image.height) return false;
            try { ctx.drawImage(char.image, srcX, srcY, TILE_SIZE, TILE_SIZE, destX, destY, TILE_SIZE, TILE_SIZE); return true; } catch(e) { return false; } 
        }

        function getActivePage(ev, state) { if (!ev.pages || ev.pages.length === 0) return null; for (let i = ev.pages.length - 1; i >= 0; i--) { const p = ev.pages[i]; let met = true; if (p.conditionSwitchId && p.conditionSwitchId !== -1) { const sw = gameSwitches.find(s => s.id === p.conditionSwitchId); if (!sw || !sw.state) met = false; } if (met && p.conditionLocalSwitch && p.conditionLocalSwitch !== "None") { if (!state || !state.localSwitches[p.conditionLocalSwitch]) met = false; } if (met) return p; } return ev.pages[0]; }

        function renderEditorMap() { if(maps.length === 0) return; const m=getCurrentMap(); editorCanvas.width=m.width*TILE_SIZE; editorCanvas.height=m.height*TILE_SIZE; editorCtx.clearRect(0,0,editorCanvas.width,editorCanvas.height); drawMapOnCanvas(editorCtx, m, false, false); drawMapOnCanvas(editorCtx, m, false, true); editorCtx.strokeStyle='rgba(255,255,255,0.1)'; for(let x=0;x<=m.width;x++){editorCtx.beginPath();editorCtx.moveTo(x*TILE_SIZE,0);editorCtx.lineTo(x*TILE_SIZE,m.height*TILE_SIZE);editorCtx.stroke();} for(let y=0;y<=m.height;y++){editorCtx.beginPath();editorCtx.moveTo(0,y*TILE_SIZE);editorCtx.lineTo(m.width*TILE_SIZE,y*TILE_SIZE);editorCtx.stroke();} for (let k in m.eventsData) { try { const ev = m.eventsData[k]; ensureEventPages(ev); if(!ev.pages || ev.pages.length === 0) continue; const p = ev.pages[0]; const [x, y] = k.split(',').map(Number); const char = projectCharacters.find(c => c.id === p.graphicCharId); const drawn = drawCharacter(editorCtx, char, p.graphicCharIndex || 0, x*TILE_SIZE, y*TILE_SIZE, 0, 1); if (!drawn) { editorCtx.fillStyle='rgba(255,0,0,0.7)'; editorCtx.beginPath(); const cx=x*TILE_SIZE+24,cy=y*TILE_SIZE+24; editorCtx.moveTo(cx,cy-12); editorCtx.lineTo(cx+12,cy); editorCtx.lineTo(cx,cy+12); editorCtx.lineTo(cx-12,cy); editorCtx.closePath(); editorCtx.fill(); } if(ev.name) { editorCtx.fillStyle = 'yellow'; editorCtx.font = 'bold 10px Arial'; editorCtx.fillText(ev.name, x*TILE_SIZE+2, y*TILE_SIZE+10); } } catch(e) {} } if(m.playerStartPos){const px=m.playerStartPos.x*TILE_SIZE,py=m.playerStartPos.y*TILE_SIZE;editorCtx.fillStyle='rgba(0,150,255,0.6)';editorCtx.fillRect(px,py,TILE_SIZE,TILE_SIZE);editorCtx.fillStyle='#fff';editorCtx.font='bold 24px Arial';editorCtx.textAlign='center';editorCtx.textBaseline='middle';editorCtx.fillText('P',px+24,py+24);} }
        
        function getGridCoordsFromEvent(e) { const m=getCurrentMap(); const rect = editorCanvas.getBoundingClientRect(); let cx, cy; if(e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; } else if(e.changedTouches && e.changedTouches.length > 0) { cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY; } else { cx = e.clientX; cy = e.clientY; } const x = Math.floor((cx - rect.left) * (editorCanvas.width / rect.width) / TILE_SIZE); const y = Math.floor((cy - rect.top) * (editorCanvas.height / rect.height) / TILE_SIZE); return {x, y, valid: x>=0 && x<m.width && y>=0 && y<m.height}; }

        function handleMapInteraction(e) { const m=getCurrentMap(); const {x, y, valid} = getGridCoordsFromEvent(e); if(!valid) return; if(currentMode==='tile'){ const newTileStr = selectedTileIndex === 0 ? "0" : `T${activeTilesetId}_${selectedTileIndex}`; const layerIdx = activeTilesetId - 1; if(m.mapData[y][x][layerIdx] !== newTileStr) { m.mapData[y][x][layerIdx] = newTileStr; renderEditorMap(); } } else if(currentMode==='player'){ m.playerStartPos={x,y}; renderEditorMap(); } }

        function handlePointerDown(e) { if (currentMode === 'tile') { isDrawing = true; handleMapInteraction(e); } else if (currentMode === 'event') { const {x, y, valid} = getGridCoordsFromEvent(e); if (!valid) return; const key = `${x},${y}`; if (Date.now() - lastClickTime < 300 && lastClickKey === key) { openEventModal(x, y); lastClickTime = 0; return; } lastClickTime = Date.now(); lastClickKey = key; const m = getCurrentMap(); if (m.eventsData[key]) { isDraggingEvent = true; draggedEventKey = key; } } else if (currentMode === 'player') { handleMapInteraction(e); } }
        function handlePointerMove(e) { if (currentMode === 'tile' && isDrawing) { handleMapInteraction(e); } else if (currentMode === 'event' && isDraggingEvent && draggedEventKey) { const {x, y, valid} = getGridCoordsFromEvent(e); if (!valid) return; const newKey = `${x},${y}`; const m = getCurrentMap(); if (draggedEventKey !== newKey && !m.eventsData[newKey]) { m.eventsData[newKey] = m.eventsData[draggedEventKey]; delete m.eventsData[draggedEventKey]; draggedEventKey = newKey; renderEditorMap(); } } }
        function handlePointerUp(e) { isDrawing = false; isDraggingEvent = false; draggedEventKey = null; }
        editorCanvas.addEventListener('mousedown', handlePointerDown); editorCanvas.addEventListener('mousemove', handlePointerMove); editorCanvas.addEventListener('mouseup', handlePointerUp); editorCanvas.addEventListener('mouseleave', handlePointerUp);
        editorCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, {passive: false}); editorCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e); }, {passive: false}); editorCanvas.addEventListener('touchend', (e) => { handlePointerUp(e); });

        function renderMapList() { const c=document.getElementById('map-list-container');c.innerHTML='';maps.forEach((m,i)=>{const it=document.createElement('div');it.className='map-item'+(i===currentMapIndex?' active':'');it.innerText=`🗺️ ${m.name}`;it.onclick=()=>switchMap(i);c.appendChild(it);}); }
        function switchMap(i) { currentMapIndex=i; ensureLayerFormat(getCurrentMap()); const m = getCurrentMap(); for(let k in m.eventsData) ensureEventPages(m.eventsData[k]); loadCurrentMapToUI();renderEditorMap();renderMapList(); }
        function loadCurrentMapToUI() { const m=getCurrentMap();document.getElementById('map-width').value=m.width;document.getElementById('map-height').value=m.height; }
        function applyMapSize() { const m=getCurrentMap();const nw=parseInt(document.getElementById('map-width').value)||m.width;const nh=parseInt(document.getElementById('map-height').value)||m.height;const nd=createEmptyMap(nw,nh);for(let y=0;y<Math.min(nh,m.height);y++)for(let x=0;x<Math.min(nw,m.width);x++)nd[y][x]=m.mapData[y][x];m.width=nw;m.height=nh;m.mapData=nd;if(m.playerStartPos&&(m.playerStartPos.x>=nw||m.playerStartPos.y>=nh))m.playerStartPos=null;renderEditorMap(); }
        function setMode(mode) { currentMode=mode;['tile','event','player'].forEach(m=>document.getElementById('mode-'+m).classList.toggle('active',mode===m));editorCanvas.style.cursor=mode==='tile'?'crosshair':'pointer'; }

        // --- СОБЫТИЯ И КОМАНДЫ ---
        function openEventModal(x,y){ const m=getCurrentMap(); const k=`${x},${y}`; currentEditEventKey=k; if(!m.eventsData[k]){ m.eventsData[k]={name:"", pages: [{ conditionSwitchId: -1, conditionLocalSwitch: "None", graphicCharId: -1, graphicCharIndex: 0, movement: "fixed", passable: true, priority: 0, commands:[] }]}; renderEditorMap(); } const ev = m.eventsData[k]; ensureEventPages(ev); document.getElementById('event-modal-title').innerText=`Событие: ${x}, ${y}`; document.getElementById('event-name-input').value = ev.name || ""; currentEventPageIndex = 0; renderEventPageTabs(); loadCurrentPageToUI(); renderScriptLines(); document.getElementById('event-modal').classList.add('active'); document.getElementById('overlay').classList.add('active'); }
        function closeEventModal(){ const m=getCurrentMap(); const ev=m.eventsData[currentEditEventKey]; if(ev) { ev.name = document.getElementById('event-name-input').value; saveCurrentPageFromUI(); } document.getElementById('event-modal').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); currentEditEventKey=null; renderEditorMap(); }
        function deleteCurrentEvent(){const m=getCurrentMap();if(currentEditEventKey&&confirm("Удалить событие?")){delete m.eventsData[currentEditEventKey];document.getElementById('event-modal').classList.remove('active');document.getElementById('overlay').classList.remove('active');currentEditEventKey=null;renderEditorMap();}}
        
        function renderEventPageTabs() { const c = document.getElementById('event-page-tabs'); c.innerHTML = ''; const ev = getCurrentMap().eventsData[currentEditEventKey]; ev.pages.forEach((p, i) => { const t = document.createElement('div'); t.className = 'page-tab' + (i === currentEventPageIndex ? ' active' : ''); t.innerText = `Стр. ${i+1}`; t.onclick = () => { saveCurrentPageFromUI(); currentEventPageIndex = i; loadCurrentPageToUI(); renderEventPageTabs(); renderScriptLines(); }; c.appendChild(t); }); const addBtn = document.createElement('div'); addBtn.className = 'add-page-tab'; addBtn.innerText = '+ Стр.'; addBtn.onclick = () => { ev.pages.push({ conditionSwitchId: -1, conditionLocalSwitch: "None", graphicCharId: -1, graphicCharIndex: 0, movement: "fixed", passable: true, priority: 0, commands:[] }); currentEventPageIndex = ev.pages.length - 1; loadCurrentPageToUI(); renderEventPageTabs(); renderScriptLines(); }; c.appendChild(addBtn); }
        function getCurrentPage() { if(!currentEditEventKey || !getCurrentMap().eventsData[currentEditEventKey]) return null; return getCurrentMap().eventsData[currentEditEventKey].pages[currentEventPageIndex]; }

        function loadCurrentPageToUI() { const p = getCurrentPage(); if(!p) return; populateGraphicSelect(p.graphicCharId); document.getElementById('event-movement-select').value = p.movement || "fixed"; document.getElementById('event-passable-select').value = (p.passable === false) ? "false" : "true"; document.getElementById('event-priority-select').value = p.priority || 0; populateConditionSelect(p.conditionSwitchId); document.getElementById('event-condition-lsw-select').value = p.conditionLocalSwitch || "None"; updateEventGraphic(); }
        function saveCurrentPageFromUI() { const p = getCurrentPage(); if(!p) return; p.graphicCharId = parseInt(document.getElementById('event-graphic-select').value); p.conditionSwitchId = parseInt(document.getElementById('event-condition-sw-select').value); p.conditionLocalSwitch = document.getElementById('event-condition-lsw-select').value; p.movement = document.getElementById('event-movement-select').value; p.passable = document.getElementById('event-passable-select').value === 'true'; p.priority = parseInt(document.getElementById('event-priority-select').value); }

        function populateGraphicSelect(selectedId) { const sel = document.getElementById('event-graphic-select'); sel.innerHTML = '<option value="-1">Нет</option>'; projectCharacters.forEach(c => { const opt = document.createElement('option'); opt.value = c.id; opt.innerText = c.name; if (c.id === selectedId) opt.selected = true; sel.appendChild(opt); }); }

        function handleCharImport(event) { const file = event.target.files[0]; if (!file) return; const charId = parseInt(event.target.dataset.charId); const reader = new FileReader(); reader.onload = function(e) { const ch = projectCharacters.find(c => c.id === charId); if(ch) { ch.imageSrc = e.target.result; ch.isDefault = false; const img = new Image(); img.onload = () => { ch.image = img; renderDbContent(); renderEditorMap(); }; img.src = ch.imageSrc; } }; reader.readAsDataURL(file); event.target.value = ""; }
        function renameSwitch(id, name) { const sw=gameSwitches.find(s=>s.id===id);if(sw)sw.name=name; }
        function addNewSwitch() { const newId=gameSwitches.length>0?Math.max(...gameSwitches.map(s=>s.id))+1:1;gameSwitches.push({id:newId,name:"Переключатель "+newId,state:false});renderDbContent(); }
        function renameVariable(id, name) { const v=gameVariables.find(x=>x.id===id);if(v)v.name=name; }
        function addNewVariable() { const newId=gameVariables.length>0?Math.max(...gameVariables.map(v=>v.id))+1:1;gameVariables.push({id:newId,name:"Переменная "+newId,value:0});renderDbContent(); }

        function saveProject() { const saveData = JSON.parse(JSON.stringify({ maps, projectTilesets, projectCharacters, projectPlayer, gameSwitches, gameVariables })); saveData.projectTilesets.forEach(ts => { if(ts.isDefault) delete ts.imageSrc; }); saveData.projectCharacters.forEach(ch => { if(ch.isDefault) delete ch.imageSrc; }); if(projectPlayer.faceImg) delete projectPlayer.faceImg; const json = JSON.stringify(saveData, null, 2); const blob = new Blob([json], {type: "application/json"}); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "project.rpgm"; a.click(); URL.revokeObjectURL(url); }
        function loadProject(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const data = JSON.parse(e.target.result); if(data.maps) maps = data.maps; if(data.gameSwitches) gameSwitches = data.gameSwitches; if(data.gameVariables) gameVariables = data.gameVariables; if(data.projectPlayer) { projectPlayer = data.projectPlayer; if(projectPlayer.faceSrc) { const img = new Image(); img.onload = () => { projectPlayer.faceImg = img; }; img.src = projectPlayer.faceSrc; } } if(data.projectTilesets) { projectTilesets = data.projectTilesets; projectTilesets.forEach(ts => { const defTs = DEFAULT_RTP.tilesets.find(d => d.id === ts.id); if(ts.isDefault && defTs && !ts.imageSrc) ts.imageSrc = defTs.path; if(ts.imageSrc) { const img = new Image(); img.onload = () => { ts.image = img; renderEditorMap(); renderPalette(); }; img.src = ts.imageSrc; } }); } if(data.projectCharacters) { projectCharacters = data.projectCharacters; projectCharacters.forEach(ch => { const defCh = DEFAULT_RTP.characters.find(d => d.id === ch.id); if(ch.isDefault && defCh && !ch.imageSrc) ch.imageSrc = defCh.path; if(ch.imageSrc) { const img = new Image(); img.onload = () => { ch.image = img; renderEditorMap(); }; img.src = ch.imageSrc; } }); } currentMapIndex = 0; switchMap(0); alert("Проект загружен!"); } catch(ex) { alert("Ошибка загрузки: " + ex); } }; reader.readAsText(file); event.target.value = ""; }
        function closeTopModal() { if(document.getElementById('database-modal').classList.contains('active'))closeDatabase();else if(document.getElementById('create-map-modal').classList.contains('active'))closeCreateMapModal();else if(document.getElementById('add-cmd-modal').classList.contains('active'))closeAddCmdModal();else closeEventModal(); }

        // ====================================================================
        // ==================== ИГРОВОЙ РЕЖИМ ====================
        // ====================================================================

        function startGame() { const m = getCurrentMap(); if (!m.playerStartPos) { alert("Нет стартовой позиции! (🧍)"); return; } isPlaying = true; isMessageShowing = false; isExecutingEvent = false; document.getElementById('game-message-box').style.display = 'none'; gameSwitches.forEach(sw => sw.state = false); gameVariables.forEach(v => v.value = 0); playerGridX = m.playerStartPos.x; playerGridY = m.playerStartPos.y; playerVisualX = playerGridX * TILE_SIZE; playerVisualY = playerGridY * TILE_SIZE; playerDir = 0; playerAnimFrame = 1; playerMoveStep = 0; isPlayerMoving = false; gameEventStates = {}; for (let key in m.eventsData) { ensureEventPages(m.eventsData[key]); const [x, y] = key.split(',').map(Number); gameEventStates[key] = { gridX: x, gridY: y, visualX: x * TILE_SIZE, visualY: y * TILE_SIZE, isMoving: false, dir: 0, animFrame: 1, moveStep: 0, waitTimer: Math.random() * 120 + 60, localSwitches: {A: false, B: false, C: false, D: false} }; } document.getElementById('editor-view').style.display = 'none'; document.getElementById('game-view').style.display = 'flex'; resizeGameCanvas(); keysPressed = {}; gameLoop(); }
        function stopGame() { isPlaying = false; cancelAnimationFrame(gameLoopId); document.getElementById('editor-view').style.display = 'flex'; document.getElementById('game-view').style.display = 'none'; }
        function resizeGameCanvas() { const c = document.getElementById('game-canvas-container'); gameCanvas.width = c.clientWidth; gameCanvas.height = c.clientHeight; }
        window.addEventListener('resize', () => { if(isPlaying) resizeGameCanvas(); });
        function gameLoop() { if (!isPlaying) return; updatePlayer(); updateEvents(); drawGameFrame(); gameLoopId = requestAnimationFrame(gameLoop); }
        
        function isTilePassable(gx, gy) { const m = getCurrentMap(); if (gx < 0 || gx >= m.width || gy < 0 || gy >= m.height) return false; for(let layerIdx = 0; layerIdx < 3; layerIdx++) { const tileStr = m.mapData[gy][gx][layerIdx]; if (tileStr !== "0") { const parts = tileStr.split('_'); const tsId = parseInt(parts[0].substring(1)); const tIdx = parseInt(parts[1]); const ts = projectTilesets.find(t => t.id === tsId); if (ts && ts.passability[tIdx] === 1) return false; } } for (let key in m.eventsData) { const ev = m.eventsData[key]; const p = getActivePage(ev, gameEventStates[key]); if (p && p.passable === false) { const state = gameEventStates[key]; if (state && state.gridX === gx && state.gridY === gy) return false; } } return true; }

        function updatePlayer() { if (isMessageShowing || isExecutingEvent) return; if (isPlayerMoving) { playerVisualX += Math.sign((playerGridX * TILE_SIZE) - playerVisualX) * PLAYER_SPEED; playerVisualY += Math.sign((playerGridY * TILE_SIZE) - playerVisualY) * PLAYER_SPEED; playerMoveStep++; playerAnimFrame = Math.floor(playerMoveStep / 8) % 4; if (playerVisualX === playerGridX * TILE_SIZE && playerVisualY === playerGridY * TILE_SIZE) { isPlayerMoving = false; playerAnimFrame = 1; playerMoveStep = 0; } return; } let dx = 0, dy = 0; if (keysPressed['ArrowUp'] || keysPressed['w'] || keysPressed['ц']) dy = -1; if (keysPressed['ArrowDown'] || keysPressed['s'] || keysPressed['ы']) dy = 1; if (keysPressed['ArrowLeft'] || keysPressed['a'] || keysPressed['ф']) dx = -1; if (keysPressed['ArrowRight'] || keysPressed['d'] || keysPressed['в']) dx = 1; if (dx === 0 && dy === 0) return; if (dy === 1 && dx === 0) playerDir = 0; else if (dx === -1) playerDir = 1; else if (dx === 1) playerDir = 2; else if (dy === -1 && dx === 0) playerDir = 3; let targetGX = playerGridX + dx; let targetGY = playerGridY + dy; let moved = false; if (dx !== 0 && dy !== 0) { let passableX = isTilePassable(playerGridX + dx, playerGridY); let passableY = isTilePassable(playerGridX, playerGridY + dy); let passableDiag = isTilePassable(targetGX, targetGY); if (passableX && passableY && passableDiag) { playerGridX = targetGX; playerGridY = targetGY; moved = true; } else if (passableX) { playerGridX += dx; moved = true; } else if (passableY) { playerGridY += dy; moved = true; } } else { if (isTilePassable(targetGX, targetGY)) { playerGridX = targetGX; playerGridY = targetGY; moved = true; } } if (moved) isPlayerMoving = true; }
        function updateEvents() { if (isMessageShowing || isExecutingEvent) return; const m = getCurrentMap(); for (let key in m.eventsData) { const ev = m.eventsData[key]; const p = getActivePage(ev, gameEventStates[key]); if (!p) continue; const state = gameEventStates[key]; if (p.movement === 'random' && state) { if (state.isMoving) { state.visualX += Math.sign((state.gridX * TILE_SIZE) - state.visualX) * EVENT_SPEED; state.visualY += Math.sign((state.gridY * TILE_SIZE) - state.visualY) * EVENT_SPEED; state.moveStep++; state.animFrame = Math.floor(state.moveStep / 8) % 4; if (state.visualX === state.gridX * TILE_SIZE && state.visualY === state.gridY * TILE_SIZE) { state.isMoving = false; state.animFrame = 1; state.moveStep = 0; } } else { state.waitTimer--; if (state.waitTimer <= 0) { state.waitTimer = Math.random() * 120 + 60; const dirs = [ {dx: 0, dy: -1, dir: 3}, {dx: 0, dy: 1, dir: 0}, {dx: -1, dy: 0, dir: 1}, {dx: 1, dy: 0, dir: 2} ]; const d = dirs[Math.floor(Math.random() * dirs.length)]; let nextGX = state.gridX + d.dx; let nextGY = state.gridY + d.dy; let blocked = !isTilePassable(nextGX, nextGY); if (!blocked && nextGX === playerGridX && nextGY === playerGridY) blocked = true; if (!blocked) { state.gridX = nextGX; state.gridY = nextGY; state.dir = d.dir; state.isMoving = true; } else { state.dir = d.dir; } } } } } }
        
        function drawGameFrame() { const m = getCurrentMap(); const ctx = gameCtx; ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height); ctx.fillStyle = '#000'; ctx.fillRect(0,0, gameCanvas.width, gameCanvas.height); const camX = gameCanvas.width / 2 - (playerVisualX + TILE_SIZE / 2), camY = gameCanvas.height / 2 - (playerVisualY + TILE_SIZE / 2); ctx.save(); ctx.translate(camX, camY); drawMapOnCanvas(ctx, m, true, false); for (let key in m.eventsData) { const ev = m.eventsData[key]; const p = getActivePage(ev, gameEventStates[key]); if(!p || (p.priority || 0) !== 1) continue; const state = gameEventStates[key]; if(!state) continue; const char = projectCharacters.find(c => c.id === p.graphicCharId); drawCharacter(ctx, char, p.graphicCharIndex || 0, state.visualX, state.visualY, state.dir, state.animFrame); } const playerChar = projectCharacters.find(c => c.id === projectPlayer.graphicCharId); const drawn = drawCharacter(ctx, playerChar, projectPlayer.graphicCharIndex || 0, playerVisualX, playerVisualY, playerDir, playerAnimFrame); if (!drawn) { ctx.fillStyle = '#4CAF50'; ctx.fillRect(playerVisualX + 8, playerVisualY + 8, TILE_SIZE - 16, TILE_SIZE - 16); } for (let key in m.eventsData) { const ev = m.eventsData[key]; const p = getActivePage(ev, gameEventStates[key]); if(!p || (p.priority || 0) !== 0) continue; const state = gameEventStates[key]; if(!state) continue; const char = projectCharacters.find(c => c.id === p.graphicCharId); drawCharacter(ctx, char, p.graphicCharIndex || 0, state.visualX, state.visualY, state.dir, state.animFrame); } drawMapOnCanvas(ctx, m, true, true); for (let key in m.eventsData) { const ev = m.eventsData[key]; const p = getActivePage(ev, gameEventStates[key]); if(!p || (p.priority || 0) !== 2) continue; const state = gameEventStates[key]; if(!state) continue; const char = projectCharacters.find(c => c.id === p.graphicCharId); drawCharacter(ctx, char, p.graphicCharIndex || 0, state.visualX, state.visualY, state.dir, state.animFrame); } ctx.restore(); }

        let resolveMessagePromise = null;
        function showAsyncMessage(text, keepOpen = false) { 
            return new Promise(resolve => { 
                isMessageShowing = true; 
                const b = document.getElementById('game-message-box'); 
                const t = document.getElementById('game-message-text'); 
                const c = document.getElementById('game-choice-container'); 
                t.innerText = text; 
                c.innerHTML = ''; // Очищаем варианты при новом сообщении
                b.style.display = 'flex'; 
                if (keepOpen) { 
                    resolve(); // Сразу продолжаем выполнение скрипта (для добавления выбора)
                } else { 
                    resolveMessagePromise = resolve; // Ждём клика игрока
                } 
            }); 
        }
        
        function showAsyncChoice(choices, cancelType) {
            return new Promise(resolve => {
                const c = document.getElementById('game-choice-container');
                c.innerHTML = '';
                choices.forEach((ch, i) => {
                    if(!ch) return;
                    const btn = document.createElement('div');
                    btn.className = 'choice-item';
                    btn.innerText = ch;
                    btn.onclick = () => {
                        isMessageShowing = false; 
                        document.getElementById('game-message-box').style.display = 'none'; 
                        resolve(i);
                    };
                    c.appendChild(btn);
                });
                
                // Если сообщение не было открыто, откроем окно
                document.getElementById('game-message-box').style.display = 'flex';
                
                const escHandler = (e) => {
                    if (e.key === 'Escape' || e.key === 'Backspace') {
                        if (cancelType >= 0 && cancelType < choices.length) {
                            isMessageShowing = false;
                            document.getElementById('game-message-box').style.display = 'none';
                            resolve(parseInt(cancelType));
                            document.removeEventListener('keydown', escHandler);
                        }
                    }
                };
                document.addEventListener('keydown', escHandler);
            });
        }

        async function gameAction() { 
            if (!isPlaying) return; 
            if (isMessageShowing) { 
                const c = document.getElementById('game-choice-container');
                // Если есть активный выбор, кнопка E не должна закрывать окно, нужно тыкнуть по варианту
                if (c && c.innerHTML !== '') return; 
                
                isMessageShowing = false; 
                document.getElementById('game-message-box').style.display = 'none'; 
                if (resolveMessagePromise) { resolveMessagePromise(); resolveMessagePromise = null; } 
                return; 
            } 
            if (isExecutingEvent || isPlayerMoving) return;
            const m = getCurrentMap();
            const dirMap = { 0: {x: 0, y: 1}, 1: {x: -1, y: 0}, 2: {x: 1, y: 0}, 3: {x: 0, y: -1} };
            let frontX = playerGridX + dirMap[playerDir].x; let frontY = playerGridY + dirMap[playerDir].y;
            
            let activeEventKey = null;
            for (let key in gameEventStates) {
                const state = gameEventStates[key]; const ev = m.eventsData[key]; const p = getActivePage(ev, state);
                if(!p) continue;
                if (state.gridX === frontX && state.gridY === frontY) { activeEventKey = key; break; }
                if (p.passable !== false && state.gridX === playerGridX && state.gridY === playerGridY) { activeEventKey = key; break; }
            }
            if (activeEventKey && m.eventsData[activeEventKey]) { 
                const ev = m.eventsData[activeEventKey]; const p = getActivePage(ev, gameEventStates[activeEventKey]);
                if(!p) return;
                const state = gameEventStates[activeEventKey];
                const oppositeDirs = [3, 2, 1, 0];
                if(state) state.dir = oppositeDirs[playerDir];
                await triggerEvent(p, activeEventKey); 
            } 
        }

        function evaluateCondition(cond, localSwitches) { 
            if (cond.conditionType === 'switch') { const sw = gameSwitches.find(s => s.id === cond.switchId); return sw ? sw.state === cond.conditionValue : false; } 
            else if (cond.conditionType === 'local_switch') { return localSwitches ? localSwitches[cond.switch] === cond.conditionValue : false; }
            else if (cond.conditionType === 'variable') { const v = gameVariables.find(x => x.id === cond.variableId); if (!v) return false; if (cond.conditionOp === '==') return v.value == cond.conditionVal; if (cond.conditionOp === '>') return v.value > cond.conditionVal; if (cond.conditionOp === '<') return v.value < cond.conditionVal; } 
            return false; 
        }
        
        async function triggerEvent(page, key) { isExecutingEvent = true; currentExecutingEventKey = key; await executeCommands(page.commands); isExecutingEvent = false; currentExecutingEventKey = null; }
        
        async function executeCommands(commands) { 
            for (let i = 0; i < commands.length; i++) { 
                const cmd = commands[i]; 
                if (!cmd) continue; 
                const ls = gameEventStates[currentExecutingEventKey] ? gameEventStates[currentExecutingEventKey].localSwitches : {};
                
                if (cmd.type === 'message') { 
                    // Проверяем, идёт ли следом выбор. Если да, не закрываем окно, а сразу показываем выбор
                    let nextCmd = commands[i+1];
                    if (nextCmd && nextCmd.type === 'choice') {
                        await showAsyncMessage(cmd.text, true); // keepOpen = true
                    } else {
                        await showAsyncMessage(cmd.text, false); 
                    }
                } 
                else if (cmd.type === 'switch') { const sw = gameSwitches.find(s => s.id === cmd.switchId); if (sw) sw.state = cmd.value; } 
                else if (cmd.type === 'local_switch') { if (gameEventStates[currentExecutingEventKey]) gameEventStates[currentExecutingEventKey].localSwitches[cmd.switch] = cmd.value; }
                else if (cmd.type === 'variable') { const v = gameVariables.find(x => x.id === cmd.variableId); if (v) { if (cmd.operation === 'set') v.value = cmd.operand; else if (cmd.operation === 'add') v.value += cmd.operand; else if (cmd.operation === 'sub') v.value -= cmd.operand; } } 
                else if (cmd.type === 'teleport') { const targetMapIdx = maps.findIndex(m => m.mapId === cmd.mapId); if(targetMapIdx !== -1) { currentMapIndex = targetMapIdx; ensureLayerFormat(getCurrentMap()); playerGridX = cmd.x; playerGridY = cmd.y; playerVisualX = playerGridX * TILE_SIZE; playerVisualY = playerGridY * TILE_SIZE; isPlayerMoving = false; gameEventStates = {}; const m = getCurrentMap(); for (let key in m.eventsData) { ensureEventPages(m.eventsData[key]); const [x, y] = key.split(',').map(Number); gameEventStates[key] = { gridX: x, gridY: y, visualX: x * TILE_SIZE, visualY: y * TILE_SIZE, isMoving: false, dir: 0, animFrame: 1, moveStep: 0, waitTimer: Math.random() * 120 + 60, localSwitches: {A: false, B: false, C: false, D: false} }; } await new Promise(r => setTimeout(r, 100)); } } 
                else if (cmd.type === 'if_start') { 
                    const conditionMet = evaluateCondition(cmd, ls); let trueBlock = []; let falseBlock = []; let depth = 1; let inTrueBlock = true; 
                    for (let j = i + 1; j < commands.length; j++) { const subCmd = commands[j]; if (subCmd && subCmd.type === 'if_start') depth++; else if (subCmd && subCmd.type === 'if_end') { depth--; if (depth === 0) { i = j; break; } } if (depth === 1 && subCmd && subCmd.type === 'else') { inTrueBlock = false; continue; } if (inTrueBlock) trueBlock.push(subCmd); else falseBlock.push(subCmd); } 
                    if (conditionMet) { await executeCommands(trueBlock); } else { await executeCommands(falseBlock); } 
                } 
                else if (cmd.type === 'choice') {
                    // Если перед выбором не было сообщения (или он сам по себе)
                    const chosenIndex = await showAsyncChoice(cmd.choices, cmd.cancelType);
                    let branchStart = -1; let branchEnd = -1; let depth = 1;
                    
                    for (let j = i + 1; j < commands.length; j++) {
                        const sub = commands[j];
                        if (sub && sub.type === 'choice') depth++;
                        else if (sub && sub.type === 'choice_end') { depth--; if (depth === 0) { branchEnd = j; break; } }
                        else if (sub && sub.type === 'choice_branch' && depth === 1) {
                            if (sub.branchIndex === chosenIndex) branchStart = j;
                            else if (branchStart !== -1 && sub.branchIndex > chosenIndex) { branchEnd = j; break; }
                        }
                    }
                    
                    if (branchStart !== -1 && branchEnd !== -1) {
                        const block = commands.slice(branchStart + 1, branchEnd);
                        await executeCommands(block);
                    }
                    
                    // Перематываем индекс цикла на конец выбора
                    depth = 1;
                    for (let j = i + 1; j < commands.length; j++) { 
                        const sub = commands[j]; 
                        if (sub && sub.type === 'choice') depth++; 
                        else if (sub && sub.type === 'choice_end') { depth--; if (depth === 0) { i = j; break; } } 
                    }
                }
            } 
        }

        document.addEventListener('keydown', (e) => { if (!isPlaying) return; keysPressed[e.key] = true; if (e.key === ' ' || e.key === 'e' || e.key === 'у') gameAction(); if (e.key === 'Escape') stopGame(); });
        document.addEventListener('keyup', (e) => { keysPressed[e.key] = false; });
        function setupTouchControls() { document.querySelectorAll('.dpad-btn').forEach(btn => { const dir = btn.dataset.dir; const keyMap = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }; btn.addEventListener('touchstart', (e) => { e.preventDefault(); keysPressed[keyMap[dir]] = true; }); btn.addEventListener('touchend', (e) => { e.preventDefault(); keysPressed[keyMap[dir]] = false; }); btn.addEventListener('mousedown', (e) => { keysPressed[keyMap[dir]] = true; }); btn.addEventListener('mouseup', (e) => { keysPressed[keyMap[dir]] = false; }); btn.addEventListener('mouseleave', (e) => { keysPressed[keyMap[dir]] = false; }); }); }

        init();
    </script>
